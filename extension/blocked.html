<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blocked — Daywinner bot</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }
      .panel {
        width: min(100%, 420px);
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 14px;
        padding: 28px 24px;
        text-align: center;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 22px;
        color: #f8fafc;
      }
      .site {
        color: #94a3b8;
        font-size: 14px;
        margin-bottom: 16px;
        word-break: break-all;
      }
      .remaining {
        font-size: 32px;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        color: #34d399;
        margin: 12px 0 4px;
      }
      .hint {
        font-size: 13px;
        color: #94a3b8;
        line-height: 1.5;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <h1>Focus session active</h1>
      <div class="site" id="site-label"></div>
      <div class="remaining" id="remaining">--:--</div>
      <p class="hint">This site is blocked until your session ends. Return to Daywinner or keep working.</p>
    </div>
    <script src="blocked.js"></script>
  </body>
</html>
